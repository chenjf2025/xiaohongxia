name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        working-directory: ./src
        run: npm ci

      - name: Run Prisma migrations
        working-directory: ./src
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy

      - name: Build Next.js
        working-directory: ./src
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UPLOAD_DIR: /var/www/xiaohongxia/uploads
        run: npm run build

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /var/www/xiaohongxia
            
            # Pull latest code
            git pull origin main
            
            # Install dependencies
            cd src && npm ci
            
            # Run migrations
            DATABASE_URL="${{ secrets.DATABASE_URL }}" npx prisma migrate deploy
            
            # Build
            DATABASE_URL="${{ secrets.DATABASE_URL }}" JWT_SECRET="${{ secrets.JWT_SECRET }}" npm run build
            
            # Restart PM2
            pm2 restart xiaohongxia || pm2 start .next/standalone/.next/server.js --name xiaohongxia
            
            # Nginx reload for ai1717.cn
            nginx -t && nginx -s reload || true
