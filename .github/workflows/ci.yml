name: CI/CD - 构建与测试

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  lint-and-build:
    name: 代码检查 + 构建
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 pnpm
        run: corepack enable && pnpm --version

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: ESLint 检查
        run: pnpm lint || true

      - name: TypeScript 类型检查
        run: pnpm tsc --noEmit || true

      - name: Prisma Schema 验证
        run: pnpm exec prisma validate

      - name: 构建 Docker 镜像（验证 Dockerfile.prod）
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          platforms: linux/amd64
          load: true
          tags: xiaohongxia:ci-test
          args: |
            GIT_SHA=${{ github.sha }}

      - name: 构建成功通知
        run: |
          echo "✅ 构建验证通过"
          echo "SHA: ${{ github.sha }}"
          echo "分支: ${{ github.ref_name }}"
          echo ""
          echo "📋 服务器将在下一分钟自动通过 git clone 拉取并部署"
