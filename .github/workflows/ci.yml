name: CI/CD - 构建与部署

on:
  push:
    branches:
      - dev      # 代码推送到 dev 分支时触发
      - main     # 代码推送到 main 分支时触发
  workflow_dispatch:  # 支持手动触发

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/xiaohongxia

jobs:
  # ============================================================
  # Job 1: 代码质量检查
  # ============================================================
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: ESLint 检查
        run: pnpm lint || true

      - name: TypeScript 类型检查
        run: pnpm tsc --noEmit

  # ============================================================
  # Job 2: 构建 Docker 镜像（多平台）
  # ============================================================
  build:
    name: 构建镜像
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 QEMU（多平台支持）
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取元信息（标签）
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 构建镜像（支持多平台 linux/amd64,linux/arm64）
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 3: 部署到服务器
  # ============================================================
  deploy:
    name: 部署到服务器
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scripts/deploy.sh
          sparse-checkout-cone-mode: false

      - name: 下载最新镜像
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          echo "镜像标签: $IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: 部署到服务器 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          envs: IMAGE_TAG,POSTGRES_PASSWORD,JWT_SECRET
          script: |
            set -e

            echo "=== 小红虾 CI/CD 部署开始 ==="
            echo "分支: ${{ github.ref_name }}"
            echo "提交: ${{ github.sha }}"
            echo "镜像: $IMAGE_TAG"

            # 登录 GitHub Container Registry
            echo "[1/6] 登录 GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 拉取最新镜像
            echo "[2/6] 拉取镜像..."
            docker pull "$IMAGE_TAG"

            # 停止旧容器
            echo "[3/6] 停止旧容器..."
            docker stop dahongshu_app || true
            docker rm dahongshu_app || true

            # 启动新容器
            echo "[4/6] 启动新容器..."
            docker run -d \
              --name dahongshu_app \
              --restart unless-stopped \
              -p 3100:3100 \
              --network docker_default \
              -e DATABASE_URL="postgresql://postgres:${POSTGRES_PASSWORD}@docker-db_postgres-1:5432/dahongshu?schema=public" \
              -e JWT_SECRET="${JWT_SECRET}" \
              -e NODE_ENV=production \
              -v /home/chenjf/dahongshu_uploads:/app/public/uploads \
              --label "app=xiaohongxia" \
              --label "commit=${{ github.sha }}" \
              "$IMAGE_TAG"

            # 健康检查
            echo "[5/6] 健康检查..."
            sleep 15
            HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:3100/ || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ 部署成功! HTTP $HTTP_CODE"
            else
              echo "❌ 健康检查失败 HTTP $HTTP_CODE"
              echo "--- 容器日志 ---"
              docker logs dahongshu_app --tail 20
              exit 1
            fi

            # 清理旧镜像
            echo "[6/6] 清理旧镜像..."
            docker image prune -f

            echo ""
            echo "=== ✅ 部署完成 ==="
            echo "提交: ${{ github.sha }}"
            echo "分支: ${{ github.ref_name }}"
            echo "时间: $(date)"
